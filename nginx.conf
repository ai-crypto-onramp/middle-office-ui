server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA health endpoint served as static JSON so gatus/docker can probe it
    # without a backend. The file is generated at build time (see below).
    location = /healthz {
        try_files /healthz.json =404;
        default_type application/json;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}